<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GDPval Explorer · openai/gdpval</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2128;
    --surface3: #262d37;
    --border: #30363d;
    --border-subtle: #21262d;
    --text: #e6edf3;
    --text-muted: #7d8590;
    --text-dim: #484f58;
    --accent: #388bfd;
    --accent-dim: #1f3d6e;
    --accent-glow: rgba(56, 139, 253, 0.15);
    --green: #3fb950;
    --orange: #f78166;
    --yellow: #d29922;
    --purple: #bc8cff;
    --tag-bg: #1c2840;
    --tag-text: #79c0ff;
    --radius: 6px;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', system-ui, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    font-size: 14px;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
    z-index: 10;
  }

  .logo-block {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    flex-shrink: 0;
  }

  .logo-text {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.02em;
  }
  .logo-text span { color: var(--text-muted); }

  .header-sep { width: 1px; height: 20px; background: var(--border); }

  .header-meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
  }
  .header-meta strong { color: var(--accent); }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .badge {
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 20px;
    background: var(--tag-bg);
    color: var(--tag-text);
    border: 1px solid var(--accent-dim);
    letter-spacing: 0.03em;
    font-weight: 500;
  }

  /* ── TOOLBAR ── */
  .toolbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .filter-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .filter-label {
    font-size: 11px;
    color: var(--text-muted);
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    white-space: nowrap;
  }

  select, input[type="text"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    padding: 5px 10px;
    border-radius: var(--radius);
    outline: none;
    transition: border-color 0.15s;
    cursor: pointer;
  }

  select:focus, input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-glow);
  }

  select { min-width: 160px; }

  input[type="text"] {
    min-width: 220px;
    cursor: text;
  }

  input[type="text"]::placeholder { color: var(--text-dim); }

  .toolbar-sep { width: 1px; height: 20px; background: var(--border); }

  .row-count {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    margin-left: auto;
  }
  .row-count strong { color: var(--text); }

  /* ── LOADING STATE ── */
  .loading-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--text-muted);
  }

  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-label {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
  }

  .loading-sub {
    font-size: 11px;
    color: var(--text-dim);
    font-family: var(--mono);
  }

  /* ── MAIN LAYOUT ── */
  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* ── TABLE PANEL ── */
  .table-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: flex 0.25s ease;
  }

  .table-wrapper {
    flex: 1;
    overflow: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead {
    position: sticky;
    top: 0;
    z-index: 2;
  }

  thead th {
    background: var(--surface2);
    border-bottom: 2px solid var(--border);
    padding: 10px 14px;
    text-align: left;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    transition: color 0.15s;
  }

  thead th:hover { color: var(--text); }
  thead th .sort-icon { margin-left: 4px; opacity: 0.4; }
  thead th.sorted { color: var(--accent); }
  thead th.sorted .sort-icon { opacity: 1; }

  tbody tr {
    border-bottom: 1px solid var(--border-subtle);
    cursor: pointer;
    transition: background 0.1s;
  }

  tbody tr:hover { background: var(--surface2); }
  tbody tr.selected { background: var(--accent-dim) !important; }
  tbody tr.selected td { color: var(--text); }

  td {
    padding: 9px 14px;
    vertical-align: top;
    color: var(--text);
  }

  .td-id {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .td-sector {
    white-space: nowrap;
  }

  .td-occupation {
    white-space: nowrap;
    color: var(--text-muted);
  }

  .td-prompt {
    max-width: 380px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--text-muted);
    font-size: 12px;
  }

  .td-files {
    text-align: center;
    font-family: var(--mono);
    font-size: 12px;
  }

  .file-count {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px; height: 24px;
    border-radius: 50%;
    font-size: 11px;
    font-weight: 600;
    background: var(--surface3);
    color: var(--text-muted);
  }

  .file-count.has-files {
    background: var(--tag-bg);
    color: var(--tag-text);
  }

  .sector-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 11px;
    font-family: var(--mono);
    font-weight: 500;
    white-space: nowrap;
  }

  /* sector colors */
  .s-government     { background: rgba(188,140,255,.15); color: #bc8cff; }
  .s-technology     { background: rgba(56,139,253,.15);  color: #79c0ff; }
  .s-finance        { background: rgba(63,185,80,.15);   color: #3fb950; }
  .s-healthcare     { background: rgba(247,129,102,.15); color: #f78166; }
  .s-education      { background: rgba(210,153,34,.15);  color: #d29922; }
  .s-retail         { background: rgba(255,166,87,.15);  color: #ffa657; }
  .s-legal          { background: rgba(138,180,248,.15); color: #8ab4f8; }
  .s-media          { background: rgba(255,121,198,.15); color: #f778ba; }
  .s-engineering    { background: rgba(97,218,251,.15);  color: #61dafb; }
  .s-default        { background: var(--surface3);       color: var(--text-muted); }

  /* ── DETAIL PANEL ── */
  .detail-panel {
    width: 0;
    overflow: hidden;
    border-left: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    transition: width 0.25s ease;
    flex-shrink: 0;
  }

  .detail-panel.open {
    width: 480px;
  }

  .detail-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    flex-shrink: 0;
  }

  .detail-title-block { flex: 1; min-width: 0; }

  .detail-task-id {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }

  .detail-occupation {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .detail-close {
    width: 28px; height: 28px;
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-muted);
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: color 0.15s, background 0.15s;
    line-height: 1;
  }
  .detail-close:hover { color: var(--text); background: var(--surface2); }

  .detail-body {
    flex: 1;
    overflow-y: auto;
    padding: 18px;
  }

  .detail-section {
    margin-bottom: 20px;
  }

  .detail-section-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .detail-section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border-subtle);
  }

  .detail-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
  }

  .prompt-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    font-size: 13px;
    line-height: 1.6;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 280px;
    overflow-y: auto;
  }

  .prompt-box::-webkit-scrollbar { width: 4px; }
  .prompt-box::-webkit-scrollbar-track { background: transparent; }
  .prompt-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .file-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .file-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    transition: border-color 0.15s;
  }

  .file-item:hover { border-color: var(--accent-dim); }

  .file-item-name {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text);
    font-weight: 500;
    word-break: break-all;
  }

  .file-item-links {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .file-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-family: var(--mono);
    text-decoration: none;
    transition: background 0.15s, color 0.15s;
    border: 1px solid transparent;
  }

  .file-link.url {
    background: rgba(56,139,253,.1);
    color: var(--accent);
    border-color: rgba(56,139,253,.2);
  }

  .file-link.url:hover {
    background: rgba(56,139,253,.2);
    color: #79c0ff;
  }

  .file-link.hf {
    background: rgba(255,166,87,.1);
    color: #ffa657;
    border-color: rgba(255,166,87,.2);
  }

  .file-link.hf:hover {
    background: rgba(255,166,87,.2);
  }

  .empty-files {
    font-size: 12px;
    color: var(--text-dim);
    font-style: italic;
    padding: 10px 0;
  }

  /* ── PAGINATION ── */
  .pagination {
    padding: 10px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    flex-shrink: 0;
  }

  .page-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 5px 12px;
    border-radius: var(--radius);
    font-size: 12px;
    cursor: pointer;
    font-family: var(--sans);
    transition: all 0.15s;
    white-space: nowrap;
  }

  .page-btn:hover:not(:disabled) {
    background: var(--surface3);
    color: var(--text);
    border-color: var(--accent-dim);
  }

  .page-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .page-info {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    flex: 1;
    text-align: center;
  }

  /* ── ERROR STATE ── */
  .error-box {
    background: rgba(247,129,102,.08);
    border: 1px solid rgba(247,129,102,.3);
    border-radius: var(--radius);
    padding: 14px 16px;
    color: var(--orange);
    font-size: 13px;
    line-height: 1.5;
    margin: 20px;
  }

  .error-box strong { display: block; margin-bottom: 6px; font-size: 14px; }

  /* ── SCROLLBARS ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  /* ── EMPTY STATE ── */
  .empty-state {
    padding: 60px 20px;
    text-align: center;
    color: var(--text-muted);
  }

  .empty-state-icon {
    font-size: 36px;
    margin-bottom: 12px;
    opacity: 0.4;
  }

  .empty-state-text {
    font-size: 13px;
    color: var(--text-muted);
  }

  /* ── RUBRIC SECTION ── */
  .rubric-raw {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1.6;
    color: var(--text-muted);
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 200px;
    overflow-y: auto;
  }

  /* row number */
  .td-rownum {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    text-align: right;
    padding-right: 8px;
    width: 36px;
    user-select: none;
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo-block">
    <div class="logo-dot"></div>
    <div class="logo-text">openai<span>/</span>gdpval</div>
  </div>
  <div class="header-sep"></div>
  <div class="header-meta">Dataset Explorer · <strong>220 tasks</strong> · 44 ocupações · v2</div>
  <div class="header-right">
    <span class="badge" id="statusBadge">Carregando…</span>
  </div>
</header>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="filter-group">
    <span class="filter-label">Sector</span>
    <select id="filterSector" onchange="applyFilters()">
      <option value="">Todos</option>
    </select>
  </div>
  <div class="toolbar-sep"></div>
  <div class="filter-group">
    <span class="filter-label">Ocupação</span>
    <select id="filterOccupation" onchange="applyFilters()">
      <option value="">Todas</option>
    </select>
  </div>
  <div class="toolbar-sep"></div>
  <div class="filter-group">
    <span class="filter-label">Busca</span>
    <input type="text" id="searchInput" placeholder="Buscar no prompt…" oninput="applyFilters()">
  </div>
  <div class="row-count" id="rowCountLabel"></div>
</div>

<!-- MAIN -->
<div class="main" id="mainArea">
  <!-- Loading screen initial -->
  <div class="loading-screen" id="loadingScreen">
    <div class="spinner"></div>
    <div class="loading-label">Conectando à API do Hugging Face…</div>
    <div class="loading-sub">https://datasets-server.huggingface.co/rows?dataset=openai/gdpval</div>
  </div>
</div>

<script>
// ──────────────────────────────────────────────────────────
//  CONFIG
// ──────────────────────────────────────────────────────────
const API_BASE = 'https://datasets-server.huggingface.co';
const DATASET  = 'openai/gdpval';
const CONFIG   = 'default';
const SPLIT    = 'train';
const BATCH    = 100;  // max 100 per request
const PAGE_SIZE = 25;

let allRows   = [];
let filtered  = [];
let currentPage = 0;
let selectedRow = null;
let sortCol = null;
let sortDir = 1;

// ──────────────────────────────────────────────────────────
//  FETCH ALL ROWS (2 batches: 0-99, 100-219)
// ──────────────────────────────────────────────────────────
async function fetchAll() {
  const mainArea = document.getElementById('mainArea');
  const loadingScreen = document.getElementById('loadingScreen');

  try {
    const urls = [
      `${API_BASE}/rows?dataset=${encodeURIComponent(DATASET)}&config=${CONFIG}&split=${SPLIT}&offset=0&length=100`,
      `${API_BASE}/rows?dataset=${encodeURIComponent(DATASET)}&config=${CONFIG}&split=${SPLIT}&offset=100&length=120`,
    ];

    document.querySelector('.loading-label').textContent = 'Baixando lote 1/2 (linhas 0–99)…';

    const [r1, r2] = await Promise.all(urls.map(u => fetch(u).then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status} – ${r.url}`);
      return r.json();
    })));

    allRows = [
      ...r1.rows.map(r => r.row),
      ...r2.rows.map(r => r.row),
    ];

    buildFilters();
    applyFilters();
    buildUI(mainArea);
    document.getElementById('statusBadge').textContent = `${allRows.length} tasks carregadas`;

  } catch (err) {
    loadingScreen.innerHTML = `
      <div class="error-box" style="max-width:520px">
        <strong>⚠ Erro ao acessar a API</strong>
        <p>Não foi possível conectar a <code>${API_BASE}</code>.</p>
        <p style="margin-top:8px;font-size:12px;opacity:.7">Detalhe: ${err.message}</p>
        <p style="margin-top:12px;font-size:12px">Isso pode ocorrer por CORS em alguns navegadores ao abrir o arquivo localmente.
        Tente via servidor local (<code>python -m http.server</code>) ou hospede o arquivo.</p>
      </div>`;
    document.getElementById('statusBadge').textContent = 'Erro';
    document.getElementById('statusBadge').style.color = '#f78166';
  }
}

// ──────────────────────────────────────────────────────────
//  BUILD FILTER OPTIONS
// ──────────────────────────────────────────────────────────
function buildFilters() {
  const sectors = [...new Set(allRows.map(r => r.sector).filter(Boolean))].sort();
  const occs    = [...new Set(allRows.map(r => r.occupation).filter(Boolean))].sort();

  const secSel = document.getElementById('filterSector');
  sectors.forEach(s => {
    const o = document.createElement('option');
    o.value = s; o.textContent = s;
    secSel.appendChild(o);
  });

  const occSel = document.getElementById('filterOccupation');
  occs.forEach(s => {
    const o = document.createElement('option');
    o.value = s; o.textContent = s;
    occSel.appendChild(o);
  });
}

// ──────────────────────────────────────────────────────────
//  BUILD MAIN UI (table + detail panel)
// ──────────────────────────────────────────────────────────
function buildUI(container) {
  container.innerHTML = `
    <div class="table-panel" id="tablePanel">
      <div class="table-wrapper" id="tableWrapper">
        <table id="dataTable">
          <thead>
            <tr>
              <th class="td-rownum" style="cursor:default"></th>
              <th onclick="sortBy('task_id')" id="th-task_id"># ID <span class="sort-icon">↕</span></th>
              <th onclick="sortBy('sector')" id="th-sector">Sector <span class="sort-icon">↕</span></th>
              <th onclick="sortBy('occupation')" id="th-occupation">Ocupação <span class="sort-icon">↕</span></th>
              <th>Prompt (prévia)</th>
              <th style="text-align:center">Arquivos</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div class="pagination" id="paginationBar"></div>
    </div>
    <div class="detail-panel" id="detailPanel">
      <div class="detail-header">
        <div class="detail-title-block">
          <div class="detail-task-id" id="detailTaskId">—</div>
          <div class="detail-occupation" id="detailOccupation">Selecione uma linha</div>
        </div>
        <button class="detail-close" onclick="closeDetail()" title="Fechar">✕</button>
      </div>
      <div class="detail-body" id="detailBody">
        <div style="padding:40px 0; text-align:center; color:var(--text-dim); font-size:12px;">
          Clique em qualquer linha da tabela para ver os detalhes
        </div>
      </div>
    </div>`;

  renderTable();
}

// ──────────────────────────────────────────────────────────
//  FILTERS & SEARCH
// ──────────────────────────────────────────────────────────
function applyFilters() {
  const sec   = document.getElementById('filterSector')?.value || '';
  const occ   = document.getElementById('filterOccupation')?.value || '';
  const query = (document.getElementById('searchInput')?.value || '').toLowerCase().trim();

  filtered = allRows.filter(r => {
    if (sec && r.sector !== sec) return false;
    if (occ && r.occupation !== occ) return false;
    if (query && !((r.prompt || '').toLowerCase().includes(query) ||
                   (r.occupation || '').toLowerCase().includes(query))) return false;
    return true;
  });

  currentPage = 0;

  const label = document.getElementById('rowCountLabel');
  if (label) {
    label.innerHTML = `<strong>${filtered.length}</strong> / ${allRows.length} tasks`;
  }

  if (document.getElementById('tableBody')) renderTable();
}

// ──────────────────────────────────────────────────────────
//  SORT
// ──────────────────────────────────────────────────────────
function sortBy(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }

  // update header
  document.querySelectorAll('thead th').forEach(th => th.classList.remove('sorted'));
  const th = document.getElementById(`th-${col}`);
  if (th) { th.classList.add('sorted'); th.querySelector('.sort-icon').textContent = sortDir === 1 ? '↑' : '↓'; }

  filtered.sort((a, b) => {
    const av = (a[col] || '').toString().toLowerCase();
    const bv = (b[col] || '').toString().toLowerCase();
    return av < bv ? -sortDir : av > bv ? sortDir : 0;
  });
  currentPage = 0;
  renderTable();
}

// ──────────────────────────────────────────────────────────
//  RENDER TABLE PAGE
// ──────────────────────────────────────────────────────────
function renderTable() {
  const tbody = document.getElementById('tableBody');
  if (!tbody) return;

  const totalPages = Math.ceil(filtered.length / PAGE_SIZE) || 1;
  const start = currentPage * PAGE_SIZE;
  const pageRows = filtered.slice(start, start + PAGE_SIZE);

  if (pageRows.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state">
      <div class="empty-state-icon">⊘</div>
      <div class="empty-state-text">Nenhuma linha encontrada com os filtros aplicados.</div>
    </div></td></tr>`;
  } else {
    tbody.innerHTML = pageRows.map((row, i) => {
      const globalIdx = allRows.indexOf(row);
      const fileCount = (row.reference_files || []).length;
      const promptPreview = (row.prompt || '—').replace(/\n/g, ' ').substring(0, 120);
      const sClass = sectorClass(row.sector);
      const isSelected = selectedRow === globalIdx;

      return `<tr onclick="selectRow(${globalIdx})" class="${isSelected ? 'selected' : ''}">
        <td class="td-rownum">${start + i + 1}</td>
        <td class="td-id">${(row.task_id || '').slice(0, 10)}…</td>
        <td class="td-sector"><span class="sector-tag ${sClass}">${row.sector || '—'}</span></td>
        <td class="td-occupation">${row.occupation || '—'}</td>
        <td class="td-prompt" title="${escHtml(row.prompt || '')}">${escHtml(promptPreview)}${(row.prompt || '').length > 120 ? '…' : ''}</td>
        <td class="td-files"><span class="file-count ${fileCount > 0 ? 'has-files' : ''}">${fileCount}</span></td>
      </tr>`;
    }).join('');
  }

  // Pagination
  const bar = document.getElementById('paginationBar');
  if (bar) {
    bar.innerHTML = `
      <button class="page-btn" onclick="goPage(0)" ${currentPage === 0 ? 'disabled' : ''}>⟨⟨ Primeira</button>
      <button class="page-btn" onclick="goPage(${currentPage - 1})" ${currentPage === 0 ? 'disabled' : ''}>⟨ Anterior</button>
      <div class="page-info">Página <strong>${currentPage + 1}</strong> de <strong>${totalPages}</strong> &nbsp;·&nbsp; ${filtered.length} tasks</div>
      <button class="page-btn" onclick="goPage(${currentPage + 1})" ${currentPage >= totalPages - 1 ? 'disabled' : ''}>Próxima ⟩</button>
      <button class="page-btn" onclick="goPage(${totalPages - 1})" ${currentPage >= totalPages - 1 ? 'disabled' : ''}>Última ⟩⟩</button>`;
  }
}

function goPage(p) {
  const totalPages = Math.ceil(filtered.length / PAGE_SIZE) || 1;
  currentPage = Math.max(0, Math.min(p, totalPages - 1));
  renderTable();
  document.getElementById('tableWrapper')?.scrollTo(0, 0);
}

// ──────────────────────────────────────────────────────────
//  ROW SELECTION → DETAIL PANEL
// ──────────────────────────────────────────────────────────
function selectRow(idx) {
  selectedRow = idx;
  renderTable();

  const row = allRows[idx];
  if (!row) return;

  // Open panel
  const panel = document.getElementById('detailPanel');
  panel.classList.add('open');

  document.getElementById('detailTaskId').textContent = row.task_id || '—';
  document.getElementById('detailOccupation').textContent = row.occupation || '—';

  const body = document.getElementById('detailBody');

  // Reference files
  const files   = row.reference_files || [];
  const urls    = row.reference_file_urls || [];
  const hfUris  = row.reference_file_hf_uris || [];

  // Deliverable files (v2 field)
  const delivFiles    = row.deliverable_files || [];
  const delivFileUrls = row.deliverable_file_urls || [];
  const delivHfUris   = row.deliverable_file_hf_uris || [];

  // Rubric
  const rubric = row.rubric || null;

  const filesHtml = files.length > 0
    ? `<div class="file-list">
        ${files.map((fname, i) => {
          const url    = urls[i]   || null;
          const hfUri  = hfUris[i] || null;
          const label  = fname.split('/').pop() || fname;
          return `<div class="file-item">
            <div class="file-item-name">📄 ${escHtml(label)}</div>
            <div class="file-item-links">
              ${url    ? `<a class="file-link url" href="${escHtml(url)}" target="_blank" rel="noopener">🔗 URL direta</a>` : ''}
              ${hfUri  ? `<a class="file-link hf"  href="${hfUriToUrl(hfUri)}" target="_blank" rel="noopener">🤗 HF Hub</a>` : ''}
            </div>
          </div>`;
        }).join('')}
      </div>`
    : `<div class="empty-files">Nenhum arquivo de referência nesta task.</div>`;

  const delivHtml = delivFiles.length > 0
    ? `<div class="file-list">
        ${delivFiles.map((fname, i) => {
          const url    = delivFileUrls[i]   || null;
          const hfUri  = delivHfUris[i] || null;
          const label  = fname.split('/').pop() || fname;
          return `<div class="file-item">
            <div class="file-item-name">📦 ${escHtml(label)}</div>
            <div class="file-item-links">
              ${url    ? `<a class="file-link url" href="${escHtml(url)}" target="_blank" rel="noopener">🔗 URL direta</a>` : ''}
              ${hfUri  ? `<a class="file-link hf"  href="${hfUriToUrl(hfUri)}" target="_blank" rel="noopener">🤗 HF Hub</a>` : ''}
            </div>
          </div>`;
        }).join('')}
      </div>`
    : `<div class="empty-files">Nenhum arquivo de entregável nesta task.</div>`;

  const rubricHtml = rubric
    ? `<div class="detail-section">
        <div class="detail-section-label">Rubric</div>
        <div class="rubric-raw">${escHtml(typeof rubric === 'object' ? JSON.stringify(rubric, null, 2) : String(rubric))}</div>
      </div>`
    : '';

  body.innerHTML = `
    <div class="detail-section">
      <div class="detail-section-label">Metadados</div>
      <div class="detail-chips">
        <span class="chip"><span class="sector-tag ${sectorClass(row.sector)}">${row.sector || '—'}</span></span>
        <span class="chip">🧑‍💼 ${escHtml(row.occupation || '—')}</span>
        <span class="chip">📎 ${files.length} ref.file${files.length !== 1 ? 's' : ''}</span>
      </div>
    </div>

    <div class="detail-section">
      <div class="detail-section-label">Prompt</div>
      <div class="prompt-box">${escHtml(row.prompt || '—')}</div>
    </div>

    <div class="detail-section">
      <div class="detail-section-label">Arquivos de referência (${files.length})</div>
      ${filesHtml}
    </div>

    <div class="detail-section">
      <div class="detail-section-label">Arquivos de entregável (${delivFiles.length})</div>
      ${delivHtml}
    </div>

    ${rubricHtml}

    <div class="detail-section">
      <div class="detail-section-label">JSON completo</div>
      <details>
        <summary style="cursor:pointer;font-size:12px;color:var(--text-muted);padding:6px 0;">Ver raw JSON…</summary>
        <pre style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;font-family:var(--mono);font-size:10px;color:var(--text-muted);overflow:auto;max-height:300px;margin-top:8px;white-space:pre-wrap;word-break:break-all;">${escHtml(JSON.stringify(row, null, 2))}</pre>
      </details>
    </div>`;
}

function closeDetail() {
  const panel = document.getElementById('detailPanel');
  panel.classList.remove('open');
  selectedRow = null;
  renderTable();
}

// ──────────────────────────────────────────────────────────
//  HELPERS
// ──────────────────────────────────────────────────────────
function escHtml(str) {
  return String(str || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function hfUriToUrl(uri) {
  // hf://datasets/openai/gdpval/.../file.ext → HF Hub URL
  if (!uri) return '#';
  // Try to convert hf:// to huggingface.co URL
  const m = uri.match(/^hf:\/\/datasets\/([^/]+\/[^/]+)\/(.+)$/);
  if (m) return `https://huggingface.co/datasets/${m[1]}/resolve/main/${m[2]}`;
  return uri;
}

function sectorClass(sector) {
  if (!sector) return 's-default';
  const s = sector.toLowerCase();
  if (s.includes('govern'))  return 's-government';
  if (s.includes('tech'))    return 's-technology';
  if (s.includes('financ'))  return 's-finance';
  if (s.includes('health'))  return 's-healthcare';
  if (s.includes('educ'))    return 's-education';
  if (s.includes('retail'))  return 's-retail';
  if (s.includes('legal') || s.includes('law')) return 's-legal';
  if (s.includes('media') || s.includes('entertain')) return 's-media';
  if (s.includes('engin') || s.includes('manufact')) return 's-engineering';
  return 's-default';
}

// ──────────────────────────────────────────────────────────
//  BOOT
// ──────────────────────────────────────────────────────────
fetchAll();
</script>
